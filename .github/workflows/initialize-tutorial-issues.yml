name: Initialize Tutorial Issues

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create-step-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create issues from docs/steps
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const stepsDir = path.join(process.env.GITHUB_WORKSPACE, 'docs', 'steps');

            if (!fs.existsSync(stepsDir)) {
              core.setFailed('docs/steps directory not found.');
              return;
            }

            const files = fs
              .readdirSync(stepsDir)
              .filter((file) => /^\d{2}-.*\.md$/.test(file))
              .sort();

            if (files.length === 0) {
              core.setFailed('No step files found in docs/steps.');
              return;
            }

            const existingIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'all',
              per_page: 100,
            });

            const existingTitles = new Set(
              existingIssues
                .filter((issue) => !issue.pull_request)
                .map((issue) => issue.title)
            );

            let created = 0;
            let skipped = 0;

            for (const file of files) {
              const fullPath = path.join(stepsDir, file);
              const markdown = fs.readFileSync(fullPath, 'utf8').trim();

              const titleMatch = markdown.match(/^#\s+(.+)$/m);
              const title = titleMatch ? titleMatch[1].trim() : `Step ${file}`;

              if (existingTitles.has(title)) {
                core.info(`Skipping existing issue: ${title}`);
                skipped += 1;
                continue;
              }

              await github.rest.issues.create({
                owner,
                repo,
                title,
                body: `${markdown}\n\n---\nGenerated by **Initialize Tutorial Issues** workflow.`,
              });

              core.info(`Created issue: ${title}`);
              created += 1;
            }

            core.summary
              .addHeading('Tutorial Issue Initialization')
              .addRaw(`Created: ${created}`)
              .addBreak()
              .addRaw(`Skipped (already existed): ${skipped}`)
              .write();
